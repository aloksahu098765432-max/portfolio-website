<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Messages</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <h1>Contact Messages</h1>

    <table border="1" cellpadding="10">

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>

        </tr>

        {% for row in data %}

        <tr>

            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
